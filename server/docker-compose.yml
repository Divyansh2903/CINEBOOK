services:
  postgres:
    image: postgres:16-alpine
    container_name: cinebook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cinebook
      POSTGRES_PASSWORD: cinebook
      POSTGRES_DB: cinebook
    ports:
      - "5432:5432"
    volumes:
      - cinebook_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinebook"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cinebook_pgdata:

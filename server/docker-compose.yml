services:
  postgres:
    image: postgres:16-alpine
    container_name: cinebook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cinebook
    # Bind to localhost only on the droplet; the API talks to it over the
    # internal compose network, so the port need not be world-reachable.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - cinebook_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d cinebook"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cinebook-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Bulk-inject everything from .env (DATABASE_URL, JWT_SECRET, ANTHROPIC_API_KEY, etc.).
    # DATABASE_URL in .env already targets the `postgres` compose service host.
    env_file: .env
    ports:
      - "127.0.0.1:4000:4000"

volumes:
  cinebook_pgdata:
